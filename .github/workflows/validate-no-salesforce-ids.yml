name: Validate No Salesforce IDs

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  scan:
    name: Hardcoded ID and raw data scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch base branch
        run: |
          git fetch origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}" --depth=1 || \
            git fetch origin "${{ github.base_ref }}" --depth=1

      - name: Run focused security precheck
        shell: bash
        run: |
          set +e
          make wi-precheck WORK_ITEM=CI-SCAN BASE_REF="origin/${{ github.base_ref }}"
          precheck_status=$?
          echo "PRECHECK_STATUS=$precheck_status" >> "$GITHUB_ENV"
          exit 0

      - name: Fail on hardcoded ID or raw data findings
        shell: bash
        run: |
          set -euo pipefail
          report=".ai/outputs/precheck/CI-SCAN.precheck.json"
          if [ ! -f "$report" ]; then
            echo "::error::Focused security precheck did not produce $report"
            exit 1
          fi
          python - <<'PY'
          import json
          import sys

          report_path = ".ai/outputs/precheck/CI-SCAN.precheck.json"
          with open(report_path, encoding="utf-8") as handle:
              report = json.load(handle)

          checks = report.get("checks", {})
          blocking = []
          for check_name in ("salesforce_ids", "raw_data"):
              findings = checks.get(check_name, {}).get("findings", [])
              for finding in findings:
                  if finding.get("severity") in {"blocking", "high"}:
                      blocking.append((check_name, finding))

          if blocking:
              for check_name, finding in blocking:
                  print(
                      f"::error file={finding.get('path', '')}::"
                      f"{check_name}: {finding.get('message', 'security finding')}"
                  )
              sys.exit(1)

          print("No blocking hardcoded Salesforce ID or raw/export data findings.")
          PY

      - name: Upload security scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: salesforce-id-raw-data-scan
          path: .ai/outputs/precheck/
          if-no-files-found: ignore
