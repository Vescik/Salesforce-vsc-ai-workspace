name: Salesforce Validate

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate Salesforce metadata
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Check manifest
        id: manifest
        shell: bash
        run: |
          if [ ! -f manifest/package.xml ]; then
            echo "manifest/package.xml not found; skipping Salesforce validation."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Check Salesforce validation secrets
        id: secrets
        if: steps.manifest.outputs.skip != 'true'
        shell: bash
        env:
          SF_JWT_KEY: ${{ secrets.SF_JWT_KEY }}
          SF_CLIENT_ID: ${{ secrets.SF_CLIENT_ID }}
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_LOGIN_URL: ${{ secrets.SF_LOGIN_URL }}
          SF_VALIDATE_ORG_ALIAS: ${{ secrets.SF_VALIDATE_ORG_ALIAS }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set +x
          missing=()
          for name in SF_JWT_KEY SF_CLIENT_ID SF_USERNAME SF_LOGIN_URL SF_VALIDATE_ORG_ALIAS; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            message="Missing Salesforce validation secrets: ${missing[*]}. Configure these repository secrets before running validation."
            if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
              echo "::error::$message"
              exit 1
            fi
            echo "::warning::$message Skipping Salesforce validation for pull_request."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Authenticate validation org
        if: steps.manifest.outputs.skip != 'true' && steps.secrets.outputs.skip != 'true'
        shell: bash
        env:
          SF_JWT_KEY: ${{ secrets.SF_JWT_KEY }}
          SF_CLIENT_ID: ${{ secrets.SF_CLIENT_ID }}
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_LOGIN_URL: ${{ secrets.SF_LOGIN_URL }}
          SF_VALIDATE_ORG_ALIAS: ${{ secrets.SF_VALIDATE_ORG_ALIAS }}
        run: |
          set +x
          key_file="$(mktemp)"
          trap 'rm -f "$key_file"' EXIT
          printf '%s' "$SF_JWT_KEY" > "$key_file"
          sf org login jwt \
            --client-id "$SF_CLIENT_ID" \
            --jwt-key-file "$key_file" \
            --username "$SF_USERNAME" \
            --instance-url "$SF_LOGIN_URL" \
            --alias "$SF_VALIDATE_ORG_ALIAS"

      - name: Validate deployment without deploying
        if: steps.manifest.outputs.skip != 'true' && steps.secrets.outputs.skip != 'true'
        shell: bash
        env:
          SF_VALIDATE_ORG_ALIAS: ${{ secrets.SF_VALIDATE_ORG_ALIAS }}
        run: |
          mkdir -p .ai/outputs
          sf project deploy validate \
            --manifest manifest/package.xml \
            --target-org "$SF_VALIDATE_ORG_ALIAS" \
            --test-level RunLocalTests \
            --json > .ai/outputs/salesforce-validate.json

      - name: Upload Salesforce validation artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: salesforce-validate
          path: .ai/outputs/salesforce-validate.json
          if-no-files-found: ignore
